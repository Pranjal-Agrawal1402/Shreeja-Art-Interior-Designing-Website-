<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enquiries — Shreeja Art Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/admin.css"/>
  <style>
    /* ── Layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; min-height: 100vh; background: var(--c-bg); font-family: var(--ff); font-size: 14px; color: var(--c-ink); }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--c-sidebar); color: #fff;
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar__logo {
      display: flex; align-items: center; gap: 10px;
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .logo-mark {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      border: 1.5px solid var(--c-brass); color: var(--c-brass);
      font-family: Georgia, serif; font-size: 1.1rem;
    }
    .logo-text { font-family: var(--ff-mono); font-size: 0.7rem; letter-spacing: 0.25em; color: #fff; }
    .sidebar__nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .sidebar__link {
      display: flex; align-items: center;
      padding: 10px 12px; border-radius: var(--r);
      color: rgba(255,255,255,0.55); font-size: 0.88rem;
      text-decoration: none; transition: all var(--transition);
    }
    .sidebar__link:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .sidebar__link.active { background: rgba(184,146,58,0.15); color: var(--c-brass-lt); }
    .sidebar__logout {
      padding: 16px 20px; background: none; border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.3); font-family: var(--ff);
      font-size: 0.78rem; cursor: pointer; text-align: left;
      transition: color var(--transition);
    }
    .sidebar__logout:hover { color: #fff; }

    /* ── Main ── */
    .admin-main {
      flex: 1; overflow-y: auto;
      padding: 36px 40px;
      display: flex; flex-direction: column; align-items: center;
    }
    .admin-main__inner { width: 100%; max-width: 1100px; }

    /* ── Header ── */
    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      margin-bottom: 28px;
    }
    .admin-header__title { font-size: 1.5rem; font-weight: 600; }
    .admin-header__actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    /* ── Search ── */
    .admin-search {
      padding: 8px 14px; border: 1.5px solid var(--c-border);
      border-radius: var(--r); font-family: var(--ff);
      font-size: 0.85rem; outline: none; background: var(--c-surface);
      transition: border-color var(--transition); width: 220px;
    }
    .admin-search:focus { border-color: var(--c-brass); }

    /* ── Buttons ── */
    .admin-btn {
      padding: 8px 16px; border: none; border-radius: var(--r);
      font-family: var(--ff); font-size: 0.82rem; font-weight: 500;
      cursor: pointer; transition: all var(--transition); white-space: nowrap;
    }
    .admin-btn--primary { background: var(--c-brass); color: #fff; }
    .admin-btn--primary:hover { background: var(--c-brass-lt); }
    .admin-btn--ghost { background: var(--c-bg); color: var(--c-mid); border: 1.5px solid var(--c-border); }
    .admin-btn--ghost:hover { background: var(--c-border); color: var(--c-ink); }

    /* ── Card ── */
    .admin-card {
      background: var(--c-surface); border-radius: var(--r);
      box-shadow: var(--shadow); overflow: hidden; width: 100%;
    }

    /* ── Table ── */
    .admin-table-wrap { overflow-x: auto; }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th {
      text-align: left; padding: 12px 16px;
      font-size: 0.72rem; font-weight: 600; color: var(--c-mid);
      text-transform: uppercase; letter-spacing: 0.07em;
      background: var(--c-bg); border-bottom: 1px solid var(--c-border);
      white-space: nowrap;
    }
    .admin-table td {
      padding: 13px 16px; border-bottom: 1px solid var(--c-border);
      font-size: 0.875rem; vertical-align: middle;
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: #FAFAFA; }
    .msg-cell { color: var(--c-mid); font-size: 0.82rem; max-width: 200px; }
    .empty-row { text-align: center; color: var(--c-muted); padding: 48px !important; font-size: 0.9rem; }

    .del-btn {
      padding: 5px 12px; background: #FEF2F2; color: #DC2626;
      border: 1.5px solid #FECACA; border-radius: var(--r);
      font-family: var(--ff); font-size: 0.78rem; cursor: pointer;
      transition: background var(--transition);
    }
    .del-btn:hover { background: #FEE2E2; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .admin-main { padding: 24px 16px; }
      .admin-search { width: 100%; }
      .admin-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">
  <div class="sidebar__logo">
    <span class="nav__logo-mark"><img src="../images/logo.jpeg" alt="Company Logo" class="logo" style="width: 50px; height: 50px; object-fit: contain; vertical-align: middle; margin-right: 8px;"></span>
    <span class="logo-text">Shreeja Art</span>
  </div>
  <nav class="sidebar__nav">
    <a href="dashboard.html"   class="sidebar__link">◈ Dashboard</a>
    <a href="enquiries.html"   class="sidebar__link active">◇ Enquiries</a>
    <a href="subscribers.html" class="sidebar__link">◻ Subscribers</a>
    <a href="projects.html"    class="sidebar__link">◈ Projects</a>
    <a href="settings.html"    class="sidebar__link">⊞ Settings</a>
  </nav>
  <button class="sidebar__logout" id="logoutBtn">Sign Out</button>
</aside>

<!-- ── Main ── -->
<main class="admin-main">
  <div class="admin-main__inner">

    <header class="admin-header">
      <h1 class="admin-header__title">Enquiries</h1>
      <div class="admin-header__actions">
        <input type="text" id="searchInput" class="admin-search" placeholder="Search enquiries…"/>
        <button class="admin-btn admin-btn--ghost"   id="clearBtn">Clear All</button>
        <button class="admin-btn admin-btn--primary" id="exportBtn">Export CSV</button>
      </div>
    </header>

    <section class="admin-card">
      <div class="admin-table-wrap">
        <table class="admin-table" id="enquiryTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Service</th>
              <th>Budget</th>
              <th>Message</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

  </div><!-- /.admin-main__inner -->
</main>

<script>
  if (localStorage.getItem('admin_auth') !== 'true') location.href = 'login.html';

  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('admin_auth'); location.href = 'login.html';
  });

  function getEnquiries() {
    try { return JSON.parse(localStorage.getItem('enquiries')) || []; }
    catch { return []; }
  }

  function renderTable(data) {
    const tbody = document.querySelector('#enquiryTable tbody');
    tbody.innerHTML = data.length
      ? data.map(e => `
          <tr>
            <td><strong>${e.fname || ''} ${e.lname || ''}</strong></td>
            <td>${e.email}</td>
            <td>${e.phone || '—'}</td>
            <td>${e.service || '—'}</td>
            <td>${e.budget || '—'}</td>
            <td class="msg-cell" title="${e.message || ''}">${(e.message || '').substring(0, 40)}…</td>
            <td>${e.date ? new Date(e.date).toLocaleDateString() : '—'}</td>
            <td><button class="del-btn" data-id="${e.id}">Delete</button></td>
          </tr>`).join('')
      : '<tr><td colspan="8" class="empty-row">No enquiries found.</td></tr>';

    tbody.querySelectorAll('.del-btn').forEach(btn =>
      btn.addEventListener('click', () => {
        let all = getEnquiries();
        all = all.filter(e => e.id !== +btn.dataset.id);
        localStorage.setItem('enquiries', JSON.stringify(all));
        renderTable(all);
      })
    );
  }

  renderTable(getEnquiries());

  document.getElementById('searchInput').addEventListener('input', function () {
    const q = this.value.toLowerCase();
    renderTable(getEnquiries().filter(e => JSON.stringify(e).toLowerCase().includes(q)));
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (confirm('Delete all enquiries?')) {
      localStorage.removeItem('enquiries');
      renderTable([]);
    }
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const data = getEnquiries();
    const csv = [
      'Name,Email,Phone,Service,Budget,Date',
      ...data.map(e => `"${e.fname} ${e.lname}","${e.email}","${e.phone || ''}","${e.service || ''}","${e.budget || ''}","${e.date || ''}"`)
    ].join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv,' + encodeURIComponent(csv);
    a.download = 'enquiries.csv';
    a.click();
  });
</script>
</body>
</html>
